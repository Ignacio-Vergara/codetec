<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Calidad - Demo Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f8fc;
      --surface: #ffffff;
      --surface-alt: #f2f6fb;
      --line: #dde6f0;
      --ink: #0d1b2a;
      --muted: #5f6f82;
      --primary: #1d4ed8;
      --primary-soft: #dbeafe;
      --success: #059669;
      --danger: #dc2626;
      --warning: #d97706;
      --chip: #ecf2f8;
      --shadow: 0 16px 40px rgba(16, 33, 56, 0.08);
      --radius-xl: 20px;
      --radius-lg: 14px;
      --radius-md: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: radial-gradient(circle at 10% -20%, #dff1ff 0%, transparent 42%),
                  radial-gradient(circle at 90% 0%, #ffe8d2 0%, transparent 38%),
                  var(--bg);
      color: var(--ink);
      font-family: Manrope, Segoe UI, sans-serif;
      min-height: 100%;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(151, 173, 198, 0.3);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
    }

    .topbar-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 14px 22px;
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #1d4ed8, #0f766e);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(29, 78, 216, 0.25);
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .brand-title {
      font-family: Space Grotesk, Manrope, sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .brand-note {
      font-size: 12px;
      color: var(--muted);
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      border: 1px solid transparent;
      background: transparent;
      color: #365069;
      padding: 9px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      text-decoration: none;
      transition: 160ms ease;
    }

    .tab:hover {
      background: #ecf3fb;
      color: #17344f;
    }

    .tab.active {
      border-color: #c3daff;
      background: linear-gradient(180deg, #eef5ff, #e5f0ff);
      color: #11417a;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid #f3d6ac;
      background: #fff9f0;
      color: #8a4b03;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #dbeafe, #f0f9ff);
      border: 1px solid #c9dfff;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 800;
      color: #1e3a5f;
    }

    .main {
      width: min(1320px, calc(100% - 24px));
      margin: 18px auto 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: reveal 280ms ease-out;
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .page-head {
      padding: 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f7fbff);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    h1, h2, h3, h4 {
      margin: 0;
      font-family: Space Grotesk, Manrope, sans-serif;
      letter-spacing: 0.01em;
    }

    h1 { font-size: 27px; }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .btn {
      border: 1px solid transparent;
      background: var(--surface-alt);
      color: #15324f;
      border-radius: 11px;
      padding: 9px 13px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 130ms ease, box-shadow 130ms ease, background 130ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(18, 40, 70, 0.12);
    }

    .btn.primary {
      background: linear-gradient(135deg, #1d4ed8, #1859a9);
      color: #fff;
    }

    .btn.success {
      background: linear-gradient(135deg, #0d9488, #0f766e);
      color: #fff;
    }

    .btn.ghost {
      border-color: var(--line);
      background: #fff;
    }

    .grid-kpi {
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .kpi {
      background: linear-gradient(165deg, #fafdff 0%, #edf5ff 100%);
      border: 1px solid #d8e5f4;
      border-radius: var(--radius-lg);
      padding: 14px;
      position: relative;
      overflow: hidden;
    }

    .kpi::after {
      content: "";
      position: absolute;
      right: -16px;
      top: -16px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29, 78, 216, 0.22), rgba(29, 78, 216, 0));
    }

    .kpi-title {
      color: #4a627c;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .kpi-value {
      font-family: Space Grotesk, Manrope, sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
    }

    .kpi-foot {
      margin-top: 7px;
      font-size: 12px;
      color: #5b728d;
    }

    .content {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .filters {
      background: #f9fcff;
      border: 1px solid #d9e6f3;
      border-radius: var(--radius-lg);
      padding: 14px;
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .label {
      font-size: 12px;
      font-weight: 700;
      color: #455f79;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    input, select, textarea {
      border-radius: 9px;
      border: 1px solid #c5d8eb;
      background: #fff;
      color: #10253f;
      font-family: inherit;
      font-size: 14px;
      padding: 9px 10px;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4e88f3;
      box-shadow: 0 0 0 3px rgba(78, 136, 243, 0.15);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border: 1px solid #dbe6f2;
      border-radius: var(--radius-lg);
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid #e8eef5;
      text-align: left;
      padding: 10px;
      font-size: 13px;
      vertical-align: top;
    }

    th {
      background: #f4f8fd;
      color: #3d5873;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    tr:hover td {
      background: #f9fcff;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--chip);
      color: #22405e;
      border: 1px solid #d7e5f5;
      padding: 4px 9px;
      font-size: 11px;
      font-weight: 700;
      margin: 1px 4px 1px 0;
      white-space: nowrap;
    }

    .score {
      display: inline-flex;
      min-width: 52px;
      justify-content: center;
      font-weight: 800;
      border-radius: 999px;
      padding: 4px 8px;
      border: 1px solid;
      font-size: 12px;
    }

    .score.good {
      background: #e6f9ee;
      color: #0f7a4f;
      border-color: #b8ebd1;
    }

    .score.mid {
      background: #fff7e9;
      color: #9a6004;
      border-color: #f4dfb5;
    }

    .score.bad {
      background: #feecec;
      color: #9f1f1f;
      border-color: #f8c8c8;
    }

    .linkish {
      color: #1e50a2;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .linkish:hover { text-decoration: underline; }

    .row-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tiny {
      padding: 6px 8px;
      font-size: 11px;
      border-radius: 8px;
    }

    .cols {
      padding: 18px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .stack {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: #fff;
      padding: 14px;
    }

    .card h3 {
      font-size: 17px;
      margin-bottom: 10px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .meta {
      background: #f6faff;
      border: 1px solid #e0ebf7;
      border-radius: 10px;
      padding: 9px;
    }

    .meta-label {
      color: #5a738f;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .meta-value {
      margin-top: 4px;
      font-weight: 700;
      font-size: 13px;
      color: #193652;
    }

    .timeline {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .timeline li {
      display: flex;
      gap: 8px;
      align-items: center;
      border: 1px solid #e3ecf6;
      border-radius: 10px;
      padding: 8px 10px;
      background: #fbfdff;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9bb6d2;
    }

    .dot.alert { background: #ef4444; }
    .dot.action { background: #0ea5a4; }

    .check-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-bottom: 10px;
    }

    .check-stat {
      text-align: center;
      border: 1px solid #e2ebf5;
      border-radius: 9px;
      background: #f8fbff;
      padding: 8px;
    }

    .check-stat strong {
      font-family: Space Grotesk, Manrope, sans-serif;
      font-size: 22px;
      display: block;
    }

    .check-list {
      max-height: 280px;
      overflow: auto;
      padding-right: 4px;
      display: grid;
      gap: 7px;
    }

    .check-item {
      border: 1px solid #e0eaf5;
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .status {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .status.ok { background: #16a34a; }
    .status.no { background: #dc2626; }

    .req {
      margin-top: 4px;
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: #fff5dc;
      color: #8f5300;
      border: 1px solid #f6dfaa;
      border-radius: 999px;
      padding: 2px 7px;
      font-weight: 800;
    }

    .bars {
      display: grid;
      gap: 8px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 120px 1fr 42px;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #35506d;
    }

    .bar-track {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: #e4edf7;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #3b82f6, #0ea5a4);
    }

    .transcript {
      max-height: 260px;
      overflow: auto;
      background: #fafcff;
      border: 1px solid #e3ebf5;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      line-height: 1.45;
      color: #24415f;
      white-space: pre-wrap;
    }

    .empty {
      border: 1px dashed #c5d6e8;
      border-radius: var(--radius-lg);
      background: #f8fbff;
      padding: 26px;
      text-align: center;
      color: #5b738d;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(7, 20, 36, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      padding: 14px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid #d3e0ef;
      border-radius: 16px;
      box-shadow: 0 26px 60px rgba(15, 28, 46, 0.24);
      overflow: hidden;
    }

    .modal-head {
      padding: 16px;
      border-bottom: 1px solid #e3ebf5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .modal-foot {
      padding: 14px 16px;
      border-top: 1px solid #e3ebf5;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .mono { font-family: ui-monospace, Menlo, Monaco, monospace; }

    .hide-mobile { display: table-cell; }

    @media (max-width: 1120px) {
      .grid-kpi { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters { grid-template-columns: 1fr 1fr; }
      .cols { grid-template-columns: 1fr; }
      .hide-mobile { display: none; }
    }

    @media (max-width: 760px) {
      .topbar-inner { padding: 12px; }
      .main { width: calc(100% - 12px); margin-top: 12px; }
      .page-head { padding: 16px; }
      h1 { font-size: 22px; }
      .tabs { width: 100%; }
      .filters { grid-template-columns: 1fr; }
      .grid-kpi { grid-template-columns: 1fr; padding: 14px; }
      .content, .cols { padding: 12px; }
      .meta-grid { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; gap: 5px; }
      .check-stats { grid-template-columns: 1fr; }
      .pill { display: none; }
    }
  </style>
</head>

        <div class="brand">

    function fmtDate(value) {
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "-";
      return new Intl.DateTimeFormat("es-CL", {

        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(d);
    }

      const hash = window.location.hash || "#/dashboard";

    function dashboardKPIs(items) {
      const total = items.length;
      const withAlarm = items.filter((e) => e.tieneAlarma).length;
      const withAction = items.filter((e) => e.accionTomada).length;
      const avg = total ? (items.reduce((acc, e) => acc + e.promedioScores, 0) / total).toFixed(1) : "0.0";
      return [
        { title: "Evaluaciones", value: total, foot: "Registros simulados para demo" },
        { title: "Con alerta", value: withAlarm, foot: "Casos con cambio detectado" },
        { title: "Con accion", value: withAction, foot: "Gestion manual registrada" },
        { title: "Promedio", value: avg, foot: "Escala de calidad 0 a 10" }
      ];
    }

      return state.evaluations.filter((item) => {

        const search = `${item.cdrId} ${item.agente} ${item.numeroOxt}`.toLowerCase();
        const validSearch = !f.search || search.includes(f.search.toLowerCase());
        const validProduct = f.product === "all" || item.producto === f.product;
        let validScore = true;
        if (f.score === "high") validScore = item.promedioScores >= 8;
        if (f.score === "mid") validScore = item.promedioScores >= 6 && item.promedioScores < 8;
        if (f.score === "low") validScore = item.promedioScores < 6;
        return validSearch && validProduct && validScore;
      });

    function downloadCsv(fileName, headers, rows) {
      const esc = (v) => `"${String(v ?? "").replaceAll('"', '""')}"`;
      const data = [headers.map(esc).join(","), ...rows.map((r) => r.map(esc).join(","))].join("\n");
      const blob = new Blob([data], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

      if (!state.modal.open) return;
      const type = document.getElementById("actionType").value;
      const label = ACTION_LABELS[type] || type;
      const section = state.modal.section;

      if (section === "dashboard") {
        const target = state.evaluations.find((e) => e.cdrId === String(state.modal.id));
        if (target) {
          target.accionTomada = label;
          target.tieneAccion = true;
          target.cambiosTimeline = target.cambiosTimeline || [];
          target.cambiosTimeline.push({ type: "accion", text: `Accion registrada: ${label}` });
        }
      }

      if (section === "whatsapp") {
        const target = state.whatsapp.find((m) => m.id === Number(state.modal.id));
        if (target) target.accionTomada = label;
      }

      closeActionModal();
      render();
    }

    function bindModalEvents() {
      document.getElementById("closeModalBtn").addEventListener("click", closeActionModal);
      document.getElementById("cancelModalBtn").addEventListener("click", closeActionModal);
      document.getElementById("saveModalBtn").addEventListener("click", saveModalAction);
      document.getElementById("actionModal").addEventListener("click", (e) => {
        if (e.target.id === "actionModal") closeActionModal();
      });
    }

    function render() {
      const route = getRoute();
      renderTabs(route.section);

      if (route.section === "detail") renderDetail(route.id);
      else if (route.section === "whatsapp") renderWhatsapp();
      else if (route.section === "telefonia") renderTelefonia();
      else renderDashboard();

      bindGlobalActions();
    }

    bindModalEvents();

    if (!window.location.hash) {
      window.location.hash = "#/dashboard";
    } else {
      render();
    }

    window.addEventListener("hashchange", render);
  </script>
</body>
</html>
